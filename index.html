<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"/><title>CUE — Book & Pay</title><script src="https://js.stripe.com/v3/"></script><style>:root{--Y:#FFC300;--BG:#080808;--CARD:#111;--TEXT:#ddd}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--BG);color:var(--TEXT);font-family:Barlow,sans-serif}nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:20px 50px;display:flex;justify-content:space-between;background:rgba(8,8,8,.9)}section{padding:80px 50px;min-height:100vh}.hero h1{font-size:80px;font-weight:900;margin:30px 0}.booking-form{background:var(--CARD);padding:30px;margin-top:30px;border:1px solid rgba(255,195,0,.2)}.form-group{margin:15px 0}.form-label{font-size:12px;text-transform:uppercase;color:#999;display:block;margin-bottom:8px}.form-input{width:100%;background:#000;border:1px solid rgba(255,195,0,.2);padding:10px;color:var(--TEXT)}.btn-primary{width:100%;padding:15px;background:var(--Y);border:0;color:#000;font-weight:900;cursor:pointer;margin-top:20px;text-transform:uppercase}.modal{display:none;position:fixed;z-index:1000;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8)}.modal.show{display:flex;align-items:center;justify-content:center}.modal-content{background:var(--CARD);padding:40px;max-width:500px;border:1px solid rgba(255,195,0,.2)}</style></head>
<body>
<nav><div style="color:var(--Y);font-size:24px;font-weight:900">🎧 CUE</div><button class="btn-primary" style="width:auto;padding:10px 20px">Get Started</button></nav>
<section class="hero"><h1>THE STAGE STARTS HERE</h1><p>Book DJs with Stripe</p><div class="booking-form"><div class="form-group"><label class="form-label">DJ Name</label><input type="text" id="djName" class="form-input" placeholder="DJ Max"></div><div class="form-group"><label class="form-label">Venue</label><input type="text" id="venueName" class="form-input" placeholder="Club Aurora"></div><div class="form-group"><label class="form-label">Date</label><input type="date" id="eventDate" class="form-input"></div><div class="form-group"><label class="form-label">Fee (€)</label><input type="number" id="bookingFee" class="form-input" placeholder="500" min="50"></div><button class="btn-primary" onclick="book()">Book & Pay</button></div></section>
<div id="modal" class="modal"><div class="modal-content"><h2>Confirm</h2><p id="modalText">Loading...</p><button class="btn-primary" onclick="pay()">Pay Now</button><button class="btn-primary" style="background:#666" onclick="closeModal()">Cancel</button></div></div>
<script>
const API='http://127.0.0.1:8000';let s=null;async function book(){const dj=document.getElementById('djName').value;const v=document.getElementById('venueName').value;const d=document.getElementById('eventDate').value;const f=parseFloat(document.getElementById('bookingFee').value);if(!dj||!v||!d||!f){alert('Fill all');return}const r=await fetch(API+'/payments/booking',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({booking_id:'BK'+Date.now(),dj_name:dj,venue_name:v,event_date:d,total_fee:f,dj_plan:'starter'})});const x=await r.json();s=x;document.getElementById('modalText').innerHTML='DJ: '+dj+'<br/>Venue: '+v+'<br/>€'+f;document.getElementById('modal').classList.add('show')}
function pay(){if(s&&s.checkout_url)window.location.href=s.checkout_url}
function closeModal(){document.getElementById('modal').classList.remove('show')}
</script>
</body>
</html>
