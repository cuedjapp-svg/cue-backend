<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CUE — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--Y:#FFC300;--Y2:#FFD740;--BG:#080808;--CARD:#111;--BORDER:rgba(255,195,0,.13);--TEXT:#ddd;--MUTED:#bbb;--D:'Barlow Condensed',sans-serif;--B:'Barlow',sans-serif;--SUCCESS:#00c864;--ERROR:#ff4444}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--BG);color:var(--TEXT);font-family:var(--B);min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#222;border-radius:2px}

/* ─── NAV ─── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 52px;background:rgba(8,8,8,.97);backdrop-filter:blur(18px);border-bottom:1px solid var(--BORDER)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-box{width:38px;height:38px;background:var(--Y);display:flex;align-items:center;justify-content:center;font-family:var(--D);font-size:22px;font-weight:900;color:#000}
.logo-text{font-family:var(--D);font-size:20px;font-weight:900;color:#fff;letter-spacing:1px}
.nav-link{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--MUTED);text-decoration:none;transition:color .2s}
.nav-link:hover{color:var(--Y)}

/* ─── MAIN ─── */
main{flex:1;display:flex;align-items:center;justify-content:center;padding:100px 20px 40px}

/* ─── LOGIN BOX ─── */
.login-box{background:var(--CARD);border:1px solid var(--BORDER);padding:44px 40px;width:100%;max-width:420px}
.login-box h1{font-family:var(--D);font-size:42px;font-weight:900;text-transform:uppercase;color:#fff;text-align:center;margin-bottom:6px;letter-spacing:1px}
.login-box h1 span{color:var(--Y)}
.login-subtitle{font-size:13px;color:var(--MUTED);text-align:center;margin-bottom:32px}

/* ─── FORM ─── */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--MUTED);margin-bottom:6px}
.form-input{width:100%;background:#0a0a0a;border:1px solid var(--BORDER);padding:13px 16px;color:var(--TEXT);font-family:var(--B);font-size:14px;outline:none;transition:all .2s}
.form-input:focus{border-color:var(--Y);background:rgba(255,195,0,.02)}
.form-input::placeholder{color:#555}
.form-input.error{border-color:var(--ERROR)}
.form-error{font-size:11px;color:var(--ERROR);margin-top:5px;display:none}
.form-error.show{display:block}

/* ─── BUTTONS ─── */
.btn-primary{width:100%;padding:16px;background:var(--Y);border:none;color:#000;font-family:var(--D);font-size:18px;font-weight:900;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px}
.btn-primary:hover{background:var(--Y2)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

/* ─── SPINNER ─── */
.spinner{width:18px;height:18px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;display:none}
.spinner.on{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── CHECKBOX ─── */
.remember-row{display:flex;align-items:center;justify-content:space-between;margin:20px 0}
.remember-wrap{display:flex;align-items:center;gap:8px}
.remember-wrap input{width:16px;height:16px;accent-color:var(--Y);cursor:pointer}
.remember-wrap label{font-size:12px;color:var(--MUTED);cursor:pointer}
.forgot-link{font-size:12px;color:var(--Y);text-decoration:none}
.forgot-link:hover{text-decoration:underline}

/* ─── DIVIDER ─── */
.divider{display:flex;align-items:center;gap:16px;margin:28px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--BORDER)}
.divider span{font-size:11px;color:var(--MUTED);text-transform:uppercase;letter-spacing:1px}

/* ─── SOCIAL BUTTONS ─── */
.social-btn{width:100%;padding:14px;background:#0a0a0a;border:1px solid var(--BORDER);color:var(--TEXT);font-family:var(--B);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px}
.social-btn:hover{border-color:var(--Y);background:rgba(255,195,0,.03)}
.social-btn img{width:18px;height:18px}

/* ─── AUTH LINK ─── */
.auth-link{font-size:13px;color:var(--MUTED);text-align:center;margin-top:28px}
.auth-link a{color:var(--Y);text-decoration:none;font-weight:600}
.auth-link a:hover{text-decoration:underline}

/* ─── ALERT ─── */
.alert{padding:14px 16px;margin-bottom:20px;font-size:12px;display:none}
.alert.error{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);color:var(--ERROR)}
.alert.success{background:rgba(0,200,100,.1);border:1px solid rgba(0,200,100,.3);color:var(--SUCCESS)}
.alert.show{display:block}

/* ─── RESPONSIVE ─── */
@media(max-width:600px){
  nav{padding:14px 20px}
  main{padding:80px 16px 32px}
  .login-box{padding:32px 24px}
  .login-box h1{font-size:32px}
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="logo">
    <div class="logo-box">C</div>
    <span class="logo-text">CUE</span>
  </a>
  <a href="inscription.html" class="nav-link">Créer un compte</a>
</nav>

<!-- MAIN -->
<main>
  <div class="login-box">
    <h1>Hey, <span>Welcome</span></h1>
    <p class="login-subtitle">Connecte-toi à ton compte CUE</p>
    
    <div class="alert error" id="errorAlert">Email ou mot de passe incorrect</div>
    <div class="alert success" id="successAlert">Connexion réussie ! Redirection...</div>
    
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Adresse email</label>
        <input type="email" class="form-input" id="email" placeholder="jean@example.com" required>
        <div class="form-error" id="emailError">Email invalide</div>
      </div>
      
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-input" id="password" placeholder="Ton mot de passe" required>
        <div class="form-error" id="passwordError">Mot de passe requis</div>
      </div>
      
      <div class="remember-row">
        <div class="remember-wrap">
          <input type="checkbox" id="remember">
          <label for="remember">Se souvenir de moi</label>
        </div>
        <a href="#" class="forgot-link">Mot de passe oublié ?</a>
      </div>
      
      <button type="submit" class="btn-primary" id="submitBtn">
        <span id="submitLabel">Se connecter</span>
        <div class="spinner" id="submitSpinner"></div>
      </button>
    </form>
    
    <div class="divider"><span>ou</span></div>
    
    <button class="social-btn" onclick="socialLogin('google')">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continuer avec Google
    </button>
    
    <button class="social-btn" onclick="socialLogin('apple')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
      Continuer avec Apple
    </button>
    
    <p class="auth-link">Pas encore inscrit ? <a href="inscription.html">Créer un compte</a></p>
  </div>
</main>

<script>
// Check if already logged in
document.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem('cue_logged_in') === 'true') {
    const redirect = new URLSearchParams(window.location.search).get('redirect');
    window.location.href = redirect || 'dashboard.html';
  }
});

// Get redirect URL from params
function getRedirectUrl() {
  const redirect = new URLSearchParams(window.location.search).get('redirect');
  return redirect || 'dashboard.html';
}

// Handle login
async function handleLogin(e) {
  e.preventDefault();
  
  // Clear errors
  document.querySelectorAll('.form-error').forEach(el => el.classList.remove('show'));
  document.querySelectorAll('.form-input').forEach(el => el.classList.remove('error'));
  document.getElementById('errorAlert').classList.remove('show');
  document.getElementById('successAlert').classList.remove('show');
  
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  
  let hasError = false;
  
  if (!email || !email.includes('@')) {
    document.getElementById('email').classList.add('error');
    document.getElementById('emailError').classList.add('show');
    hasError = true;
  }
  
  if (!password) {
    document.getElementById('password').classList.add('error');
    document.getElementById('passwordError').classList.add('show');
    hasError = true;
  }
  
  if (hasError) return;
  
  // Show loading
  const btn = document.getElementById('submitBtn');
  const spinner = document.getElementById('submitSpinner');
  const label = document.getElementById('submitLabel');
  btn.disabled = true;
  spinner.classList.add('on');
  label.textContent = 'Connexion...';
  
  // Simulate API call
  await new Promise(r => setTimeout(r, 1500));
  
  // Check stored user or allow any login for demo
  const storedUser = localStorage.getItem('cue_user');
  
  if (storedUser) {
    const user = JSON.parse(storedUser);
    if (user.email === email && user.password === password) {
      // Success
      document.getElementById('successAlert').classList.add('show');
      localStorage.setItem('cue_logged_in', 'true');
      setTimeout(() => window.location.href = getRedirectUrl(), 1500);
      return;
    }
  }
  
  // For demo: allow any login with password >= 8 chars
  if (password.length >= 8) {
    // Create mock user
    const mockUser = {
      id: Date.now(),
      firstName: email.split('@')[0],
      lastName: 'User',
      email: email,
      phone: '612345678',
      userType: 'dj',
      referralCodeOwn: 'REF' + Date.now().toString().slice(-6),
      verified: true,
      createdAt: new Date().toISOString()
    };
    localStorage.setItem('cue_user', JSON.stringify(mockUser));
    localStorage.setItem('cue_logged_in', 'true');
    
    document.getElementById('successAlert').classList.add('show');
    setTimeout(() => window.location.href = getRedirectUrl(), 1500);
    return;
  }
  
  // Error
  document.getElementById('errorAlert').classList.add('show');
  btn.disabled = false;
  spinner.classList.remove('on');
  label.textContent = 'Se connecter';
}

// Social login (mock)
function socialLogin(provider) {
  alert('Connexion via ' + provider + ' bientôt disponible !');
}
</script>

</body>
</html>
